<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>¿Niño o Niña? | Juan y Camila</title>
    
    <!-- Social Media Meta Tags -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="¡Tenemos una sorpresa para ti! 🧸">
    <meta property="og:description" content="Juan y Camila te invitan a compartir un momento muy especial.">
    <meta property="og:url" content="https://nucleocolectivoart2.github.io/invitacion/">
    <!-- Usando URL raw para que WhatsApp/Redes puedan leer la imagen -->
    <meta property="og:image" content="https://raw.githubusercontent.com/nucleocolectivoart2/invitacion/main/preview.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="¡Tenemos una sorpresa para ti! 🧸">
    <meta name="twitter:description" content="Juan y Camila te invitan a compartir un momento muy especial.">
    <meta name="twitter:image" content="https://raw.githubusercontent.com/nucleocolectivoart2/invitacion/main/preview.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @font-face {
            font-family: 'Baloo 2 Original';
            src: url('https://cdn.jsdelivr.net/gh/nucleocolectivoart2/invitacion@main/elementos/Fonts/Baloo2-ExtraBold.ttf') format('truetype');
            font-weight: 800; font-style: normal; font-display: swap;
        }
        @font-face {
            font-family: 'Cormorant Garamond Original';
            src: url('https://cdn.jsdelivr.net/gh/nucleocolectivoart2/invitacion@main/elementos/Fonts/CormorantGaramond-SemiBoldItalic.ttf') format('truetype');
            font-weight: 600; font-style: italic; font-display: swap;
        }
        html, body { margin: 0; padding: 0; width: 100%; height: 100dvh; overflow: hidden; background-color: #f7f3ef; font-family: sans-serif; }
        .phone-canvas { position: relative; width: 100%; height: 100dvh; max-width: 450px; margin: 0 auto; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.15); background-color: #F6F3EF; }
        .fade-in-element { opacity: 0; transform: translateY(20px); transition: opacity 1s ease, transform 1s ease; }
        .fade-in-element.active { opacity: 1; transform: translateY(0); }
        .bg-fade { opacity: 0; transition: opacity 2s ease-in-out; }
        .bg-fade.active { opacity: 1; }
        .glass-card { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.8); }
        .rsvp-btn { position: absolute; top: 20px; right: 20px; z-index: 20; }
        .mute-btn { position: absolute; top: 20px; left: 20px; z-index: 20; }
    </style>
</head>
<body class="flex items-center justify-center bg-neutral-200">

    <div id="app-container" class="phone-canvas flex flex-col justify-between">
        
        <!-- INTRO SCREEN -->
        <div id="intro-screen" class="absolute inset-0 z-50 flex flex-col items-center bg-[#F6F3EF]">
            <img src="https://raw.githubusercontent.com/nucleocolectivoart2/invitacion/main/elementos/fondo1.png" class="absolute inset-0 w-full h-full object-cover z-0 bg-fade" alt="Fondo Inicial" id="bg-intro">
            <div class="relative z-10 flex flex-col items-center w-full pt-12 px-6 h-full justify-between pb-10">
                
                <div class="flex flex-col items-center w-full">
                    <p class="font-serif text-[2.2rem] text-[#3B2415] italic mt-4 fade-in-element intro-anim">Juan y Camila</p>
                    <p class="font-serif text-lg text-[#5E3512]/80 italic fade-in-element intro-anim">te tienen una sorpresa...</p>
                    
                    <div class="glass-card w-full max-w-[340px] mt-6 p-4 rounded-3xl shadow-sm fade-in-element intro-anim">
                        <p class="text-center font-bold text-[#5E3512]/70 text-xs uppercase tracking-widest mb-3 italic">Faltan para el gran día</p>
                        <div class="grid grid-cols-4 gap-2">
                            <div class="flex flex-col items-center"><span id="days" class="text-xl font-bold text-[#5E3512]">00</span><span class="text-[9px] uppercase text-[#8B6E5A]">Días</span></div>
                            <div class="flex flex-col items-center"><span id="hours" class="text-xl font-bold text-[#5E3512]">00</span><span class="text-[9px] uppercase text-[#8B6E5A]">Hrs</span></div>
                            <div class="flex flex-col items-center"><span id="mins" class="text-xl font-bold text-[#5E3512]">00</span><span class="text-[9px] uppercase text-[#8B6E5A]">Mins</span></div>
                            <div class="flex flex-col items-center"><span id="secs" class="text-xl font-bold text-[#5E3512]">00</span><span class="text-[9px] uppercase text-[#8B6E5A]">Segs</span></div>
                        </div>
                        <div class="mt-4 pt-3 border-t border-[#5E3512]/10 text-center space-y-1">
                            <p class="font-bold text-[#5E3512] text-[13px]">📅 Domingo 14 de Junio | 🕒 3:00 pm</p>
                            <p class="text-[#5E3512]/80 text-[11px] italic">📍 La Bendita Picnic, Rionegro (Barro Blanco)</p>
                        </div>
                    </div>
                </div>
                <button onclick="playInvitation()" class="w-full max-w-[260px] bg-[#E8DCCB] text-[#5E3512] font-bold py-4 rounded-full shadow-md z-10 fade-in-element intro-anim hover:scale-105 transition-all">✨ Toca para abrir ✨</button>
            </div>
        </div>

        <!-- CONTENIDO PRINCIPAL -->
        <img src="https://raw.githubusercontent.com/nucleocolectivoart2/invitacion/main/elementos/fondo.png" class="absolute inset-0 w-full h-full object-cover z-0 bg-fade" alt="Fondo Principal" id="bg-main">
        
        <!-- Botón RSVP y Mute -->
        <button id="mute-btn" onclick="toggleMute()" class="mute-btn bg-black/50 text-white p-2 rounded-full shadow-lg hover:scale-105 transition-all">
            <svg id="speaker-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M14 3.23v2.99c2.32.7 4 2.87 4 5.43 0 2.56-1.68 4.74-4 5.44v2.99c3.39-.77 6-3.83 6-8.43 0-4.6-2.61-7.66-6-8.42zM7 9v6h3l5 5V4l-5 5H7z"/>
            </svg>
        </button>
        <a href="https://wa.me/573012243511?text=¡Hola!%20Confirmo%20mi%20asistencia!" target="_blank" class="rsvp-btn bg-[#4A3728] text-white text-[10px] font-bold px-4 py-2 rounded-full shadow-lg hover:scale-105 transition-all">
            Confirmar RSVP ✨
        </a>

        <div class="absolute inset-0 z-10 pointer-events-none flex flex-col items-center justify-center">
            <img src="https://raw.githubusercontent.com/nucleocolectivoart2/invitacion/main/elementos/nino%20o%20nina.png" class="absolute top-[5%] w-[69%] fade-in-element content-anim" alt="Título">
            <img src="https://raw.githubusercontent.com/nucleocolectivoart2/invitacion/main/elementos/vamos%20a%20descubrirlo.png" class="absolute top-[26%] w-[52%] fade-in-element content-anim" alt="Subtítulo">
            <img src="https://raw.githubusercontent.com/nucleocolectivoart2/invitacion/main/elementos/texto.png" class="absolute top-[68%] w-[78%] fade-in-element content-anim" alt="Texto descriptivo">
            <img src="https://raw.githubusercontent.com/nucleocolectivoart2/invitacion/main/elementos/te%20esperamos.png" class="absolute top-[78%] w-[39%] fade-in-element content-anim" alt="Llamado a la acción">
            <img src="https://raw.githubusercontent.com/nucleocolectivoart2/invitacion/main/elementos/datos.png" class="absolute bottom-[4.5%] w-[84%] fade-in-element content-anim" alt="Datos del evento">
        </div>
    </div>

    <script>
        const bgMusic = new Audio("https://raw.githubusercontent.com/nucleocolectivoart2/invitacion/main/elementos/46851258-musique-de-la-berceuse-338570.mp3");
        bgMusic.loop = true;
        
        let isMuted = false;
        function toggleMute() {
            isMuted = !isMuted;
            bgMusic.muted = isMuted;
            const icon = document.getElementById('speaker-icon');
            icon.innerHTML = isMuted 
                ? '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C18.63 14.91 19 13.5 19 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3z"/>' 
                : '<path d="M14 3.23v2.99c2.32.7 4 2.87 4 5.43 0 2.56-1.68 4.74-4 5.44v2.99c3.39-.77 6-3.83 6-8.43 0-4.6-2.61-7.66-6-8.42zM7 9v6h3l5 5V4l-5 5H7z"/>';
        }

        const targetDate = new Date("June 14, 2026 15:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const diff = targetDate - now;
            if (diff > 0) {
                document.getElementById('days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
                document.getElementById('hours').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
                document.getElementById('mins').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
                document.getElementById('secs').innerText = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');
            }
        }
        
        setInterval(updateCountdown, 1000);
        updateCountdown();

        window.addEventListener('DOMContentLoaded', () => {
            // Animar fondo inicial
            document.getElementById('bg-intro').classList.add('active');
            document.querySelectorAll('.intro-anim').forEach((el, i) => setTimeout(() => el.classList.add('active'), i * 200));
        });

        function playInvitation() {
            bgMusic.play().catch(e => console.log("Audio playback failed"));
            const intro = document.getElementById('intro-screen');
            // Animar fondo principal al abrir
            document.getElementById('bg-main').classList.add('active');
            
            intro.style.opacity = '0';
            setTimeout(() => { 
                intro.style.display = 'none'; 
                document.querySelectorAll('.content-anim').forEach((el, i) => setTimeout(() => el.classList.add('active'), i * 300));
            }, 1000);
        }
    </script>
</body>
</html>
