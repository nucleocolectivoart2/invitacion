<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Revelación de Género - Juan y Camila</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        @font-face {
            font-family: 'Baloo 2 Original';
            src: url('https://cdn.jsdelivr.net/gh/nucleocolectivoart2/invitacion@main/elementos/Fonts/Baloo2-ExtraBold.ttf') format('truetype');
            font-weight: 800;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'Cormorant Garamond Original';
            src: url('https://cdn.jsdelivr.net/gh/nucleocolectivoart2/invitacion@main/elementos/Fonts/CormorantGaramond-SemiBoldItalic.ttf') format('truetype');
            font-weight: 600;
            font-style: italic;
            font-display: swap;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f7f3ef;
            font-family: 'Montserrat', sans-serif;
        }

        .font-baloo { font-family: 'Baloo 2 Original', 'Baloo 2', cursive; }
        .font-cormorant { font-family: 'Cormorant Garamond Original', 'Cormorant Garamond', serif; }

        .phone-canvas {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 450px;
            margin: 0 auto;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            background-color: #F6F3EF;
        }

        .text-glow {
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.95), 0 0 25px rgba(255, 255, 255, 0.9);
        }

        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }
        .anim-float { animation: gentleFloat 6s ease-in-out infinite; }

        .fade-in-element {
            opacity: 0;
            transform: translateY(20px) scale(0.98);
            transition: opacity 1.2s cubic-bezier(0.25, 1, 0.5, 1), transform 1.2s cubic-bezier(0.25, 1, 0.5, 1);
            will-change: transform, opacity;
        }
        .fade-in-element.active { opacity: 1; transform: translateY(0) scale(1); }

        .paused-waves span { animation-play-state: paused !important; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen bg-neutral-200">

    <div id="app-container" class="phone-canvas flex flex-col justify-between">

        <button id="audioToggleBtn" onclick="toggleAudio()" class="absolute top-4 left-4 z-40 bg-white/75 backdrop-blur-md hover:bg-white p-2.5 rounded-full text-[#5E3512] shadow-md transition-all flex items-center justify-center space-x-1 hidden">
            <svg id="audioIcon" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19.114 5.636a9 9 0 010 12.728M16.463 8.288a5.25 5.25 0 010 7.424M6.75 8.25l4.72-4.72a.75.75 0 011.28.53v15.88a.75.75 0 01-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.01 9.01 0 012.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75z" />
            </svg>
            <div id="audioWaves" class="audio-wave flex items-end h-[12px] space-x-[2px]">
                <span class="w-[2px] h-[5px] bg-[#5E3512] rounded-full animate-bounce" style="animation-duration: 0.8s;"></span>
                <span class="w-[2px] h-[9px] bg-[#5E3512] rounded-full animate-bounce" style="animation-duration: 0.6s; animation-delay: 0.15s;"></span>
                <span class="w-[2px] h-[6px] bg-[#5E3512] rounded-full animate-bounce" style="animation-duration: 0.7s; animation-delay: 0.3s;"></span>
            </div>
        </button>

        <a id="rsvpBtn" href="https://wa.me/573012243511?text=¡Hola!%20Confirmo%20mi%20asistencia!" target="_blank" class="absolute top-4 right-4 z-40 bg-[#5E3512] text-[#FBF8F4] font-baloo text-sm px-4 py-2 rounded-full shadow-lg transition-all transform active:scale-95 flex items-center space-x-1.5 border border-white/20 hidden">
            <span>Confirmar RSVP</span>
        </a>

        <div id="intro-screen" class="absolute inset-0 z-50 bg-[#F6F3EF] flex flex-col justify-between items-center transition-all duration-1000">
            <img src="https://raw.githubusercontent.com/nucleocolectivoart2/invitacion/main/elementos/fondo1.png" class="absolute inset-0 w-full h-full object-cover z-0">
            
            <div class="relative z-10 flex flex-col items-center w-full pt-16 px-6 pb-12 h-full justify-between">
                
                <div class="flex flex-col items-center w-full">
                    <div class="text-center mb-8"><span class="text-amber-500/60 text-lg">✨ 🍼 ✨</span></div>
                    
                    <div class="text-center space-y-6 flex flex-col justify-center items-center">
                        <div class="space-y-1">
                            <p class="font-cormorant text-[2.8rem] text-[#3B2415] italic leading-tight">Juan y Camila</p>
                            <p class="font-cormorant text-2xl text-[#5E3512]/80 italic">te tienen una sorpresa...</p>
                        </div>
                        <div class="space-y-1">
                            <span class="font-cormorant text-2xl text-[#3B2415]/70 italic block">Revelación de</span>
                            <h1 class="font-baloo text-[3rem] text-[#6B3A10] leading-none">GÉNERO</h1>
                        </div>
                    </div>
                </div>

                <button onclick="playInvitation()" class="w-full max-w-[260px] bg-[#E8DCCB] text-[#5E3512] font-baloo text-lg py-4 rounded-full shadow-md z-10 hover:scale-105 transition-transform">✨ Reproducir ✨</button>
            </div>
        </div>

        <img src="https://raw.githubusercontent.com/nucleocolectivoart2/invitacion/main/elementos/fondo.png" class="absolute inset-0 w-full h-full object-cover z-0">

        <div class="absolute inset-0 z-10 pointer-events-none">
            <div class="absolute top-[6.5%] w-full text-center z-30 font-cormorant text-[2.2rem] text-[#5E3512] text-glow fade-in-element">Juan y Camila</div>
            
            <img src="https://raw.githubusercontent.com/nucleocolectivoart2/invitacion/main/elementos/nino%20o%20nina.png" 
                 class="absolute top-[13%] left-[15.5%] w-[69%] z-20 fade-in-element anim-float">
            
            <img src="https://raw.githubusercontent.com/nucleocolectivoart2/invitacion/main/elementos/vamos%20a%20descubrirlo.png" 
                 class="absolute top-[32%] left-[24%] w-[52%] z-20 fade-in-element anim-float">

            <img src="https://raw.githubusercontent.com/nucleocolectivoart2/invitacion/main/elementos/texto.png" 
                 class="absolute top-[67%] left-[11%] w-[78%] z-20 fade-in-element">

            <img src="https://raw.githubusercontent.com/nucleocolectivoart2/invitacion/main/elementos/te%20esperamos.png" 
                 class="absolute top-[78%] left-[31%] w-[39%] z-20 fade-in-element">

            <img src="https://raw.githubusercontent.com/nucleocolectivoart2/invitacion/main/elementos/datos.png" 
                 class="absolute bottom-[4.5%] left-[8%] w-[84%] z-20 fade-in-element">
        </div>
    </div>

    <script>
        const introScreen = document.getElementById('intro-screen');
        const audioToggleBtn = document.getElementById('audioToggleBtn');
        const rsvpBtn = document.getElementById('rsvpBtn');
        const audioWaves = document.getElementById('audioWaves');
        const bgMusic = new Audio("https://raw.githubusercontent.com/nucleocolectivoart2/invitacion/main/elementos/46851258-musique-de-la-berceuse-338570.mp3");
        bgMusic.loop = true;

        function playInvitation() {
            introScreen.style.opacity = '0';
            setTimeout(() => { introScreen.style.display = 'none'; triggerAnimations(); }, 1000);
            audioToggleBtn.classList.remove('hidden');
            rsvpBtn.classList.remove('hidden');
            bgMusic.play().catch(e => console.log("Audio play prevented:", e));
        }

        function triggerAnimations() { 
            document.querySelectorAll('.fade-in-element').forEach((el, i) => setTimeout(() => el.classList.add('active'), i * 400)); 
        }

        function toggleAudio() {
            if (bgMusic.paused) { bgMusic.play(); audioWaves.classList.remove('paused-waves'); }
            else { bgMusic.pause(); audioWaves.classList.add('paused-waves'); }
        }
    </script>
</body>
</html>
